spring.application.name=apigateway
server.port=8080

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

eureka.instance.instance-id=${spring.application.name}:${random.value}
management.endpoints.web.exposure.include=*

# Configuración para api gateway
spring.cloud.gateway.server.webflux.routes[0].id=micro-server-categorias
spring.cloud.gateway.server.webflux.routes[0].uri=lb://CATEGORIAS
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/categorias/**
#spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=1
spring.cloud.gateway.server.webflux.routes[1].id=micro-server-productos
spring.cloud.gateway.server.webflux.routes[1].uri=lb://PRODUCTOS
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/productos/**
#spring.cloud.gateway.server.webflux.routes[1].filters[0]=StripPrefix=1
